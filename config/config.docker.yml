# Docker 環境用の設定ファイル
# このファイルは config.yml が存在しない場合に自動的にコピーされます

title: Tenjine

# データベース: SQLite または MySQL
database: SQLite

Flask:
  Debug: False

# MySQL を使う場合は database を MySQL に変更し、mysql プロファイルを有効化してください
MySQL:
  dbname: tenjine
  host: mysql
  username: tenjine
  password: password

# アップロードファイルの保存先 (コンテナ内パス)
SaveDir: /app/uploads

Redis:
  host: redis
  port: 6379
  password: password

ADServer:
  use: False
  address: localhost
  domains:
    - example.com
  groups:
    Admin: Teachers
    Student: Students

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./config:/app/config
      - uploads:/app/uploads
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass password
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # MySQL を使う場合: docker compose --profile mysql up
  mysql:
    image: mysql:8.0
    profiles:
      - mysql
    environment:
      MYSQL_DATABASE: tenjine
      MYSQL_USER: tenjine
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "tenjine", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  uploads:
  sqlite_data:
  redis_data:
  mysql_data:
